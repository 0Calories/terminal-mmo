# CI gate (ADR 0012). Runs on every PR to `main` and on push to `main`. One job,
# one checkout/install — each check is its own step (so the run UI shows which
# dimension failed) and runs even if an earlier check failed (`!cancelled()`), so a
# single push surfaces every failure at once. Required as a status check on `main`.
# Split into parallel jobs only once an individual check crosses ~1–2 min.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint & format (biome)
        if: ${{ !cancelled() }}
        run: bunx biome ci .
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: bun run typecheck
      - name: Test
        if: ${{ !cancelled() }}
        run: bun test
      - name: Dependency boundaries (dependency-cruiser)
        if: ${{ !cancelled() }}
        run: bun run depcruise
      - name: Zones check
        if: ${{ !cancelled() }}
        run: bun run zones:check
      - name: Sprites check
        if: ${{ !cancelled() }}
        run: bun run sprites:check
