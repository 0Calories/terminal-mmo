# Release pipeline (ADR 0012). Fires on a `v*` tag — the only thing that ships.
# Atomic, deploy-first/publish-last: gate → deploy the server → assert /health
# reports the tag → publish the client. npm publish is the irreversible step and
# runs LAST, gated on a healthy, correctly-versioned deploy, so a failed deploy
# never burns an npm version.
#
# npm auth uses npm Trusted Publishing (OIDC) — NO npm token. The job requests an
# OIDC identity token (`id-token: write`) that npm exchanges for a short-lived,
# single-use publish credential, and stamps build provenance automatically. This
# workflow file's path must be registered as the Trusted Publisher on the
# `terminal-mmo` package (npmjs.com → package → Settings → Publishing access).
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release at the end
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

env:
  # The Railway service to deploy, kept as a repo variable (Settings → Secrets and
  # variables → Actions → Variables) so the live service name lives in config, not
  # code. (HEALTH_URL is derived at runtime from the client's single source of
  # truth — see the "Derive health URL" step below.)
  RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # Node + a current npm (>= 11.5.1) are what perform the OIDC publish.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      # The tag is the single source of truth for the Version. `v0.3.0` -> `0.3.0`.
      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # The prod host has ONE definition — packages/client/src/server-url.ts, which
      # the client also bakes into its bundle. Read it by path (no workspace install
      # needed) so the /health gate can never target a different host than players do.
      - name: Derive health URL from the client's single source of truth
        run: |
          HOST="$(bun -e 'import { PROD_SERVER_HOST } from "./packages/client/src/server-url.ts"; process.stdout.write(PROD_SERVER_HOST)')"
          echo "HEALTH_URL=https://$HOST/health" >> "$GITHUB_ENV"

      # Re-run the full gate on the tagged commit before shipping anything.
      - name: CI gate
        run: bun run ci

      # --- Deploy the server FIRST (reversible step) -----------------------------
      - name: Deploy server to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Stamp this release's Version onto the service first, WITHOUT redeploying
          # the old code (--skip-deploys), then build+deploy the tagged commit
          # (Dockerfile) with the variable already in place.
          #
          # Use --detach, NOT --ci: when the tagged commit changes nothing under the
          # service's watch paths (e.g. a client-only release, or a re-tag that only
          # touches CI), Railway skips the build — and `up --ci` then hangs forever
          # waiting to stream a deployment that was never created. --detach uploads,
          # triggers the deploy, and returns immediately; the /health gate below is
          # what actually confirms the new container is live and serving $VERSION (and
          # refuses to publish if a real build fails to come up in time).
          bunx @railway/cli variables set "MMO_VERSION=$VERSION" \
            --service "$RAILWAY_SERVICE" \
            --skip-deploys
          bunx @railway/cli up --detach -y --service "$RAILWAY_SERVICE"
          # SERVER_VERSION is read from the MMO_VERSION env var at process start
          # (packages/server/src/index.ts), so /health only reports $VERSION once a
          # container actually (re)starts with the staged variable. On a client-only
          # release the `up` above skips the build (no watch-path change), so NO new
          # container ever starts and /health would report the old Version forever —
          # the health gate could never pass. Force a redeploy so the current
          # deployment restarts with the staged MMO_VERSION regardless of whether a
          # build ran. On a server-change release this is a cheap redundant restart
          # of the just-deployed code; on a client-only release it is what applies
          # the new Version at all.
          #
          # `up --detach` returns the moment it triggers the deployment, before that
          # deployment settles — so a bare redeploy races it and Railway errors with
          # "the latest deployment ... cannot be redeployed ... currently building,
          # deploying, or was removed". Retry until Railway accepts it (the up-created
          # deployment reaches a redeployable state); fail hard if it never does so we
          # never fall through to a /health gate that can't pass.
          for i in $(seq 1 30); do
            if bunx @railway/cli redeploy -y --service "$RAILWAY_SERVICE"; then
              echo "redeploy accepted on attempt $i"
              exit 0
            fi
            echo "redeploy not yet accepted (attempt $i) — deployment still settling, retrying in 10s"
            sleep 10
          done
          echo "::error::redeploy never accepted after 30 attempts (~5 min)"
          exit 1

      # --- Gate: the live server must report exactly this Version ----------------
      # Now that the deploy is detached, this gate spans the whole build → deploy →
      # healthy cycle (not just container startup), so it polls generously: 90 × 5s
      # ≈ 7.5 min. The forced redeploy above restarts the container with the staged
      # MMO_VERSION even when the build is skipped, so this gate passes once that
      # restart is healthy; a real build that never comes up trips the refuse-to-publish.
      - name: Assert /health reports the tag
        run: |
          for i in $(seq 1 90); do
            body="$(curl -fsS "$HEALTH_URL" || true)"
            got="$(printf '%s' "$body" | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).version' 2>/dev/null || true)"
            echo "attempt $i: server reports '${got}', want '${VERSION}'"
            if [ "$got" = "$VERSION" ]; then
              echo "deploy confirmed at $VERSION"
              exit 0
            fi
            sleep 5
          done
          echo "::error::server never reported version $VERSION — refusing to publish"
          exit 1

      # --- Publish the client LAST (irreversible step), via OIDC -----------------
      - name: Publish terminal-mmo to npm (Trusted Publishing)
        working-directory: packages/cli
        env:
          # Baked into the bundle by build.ts (prepublishOnly) as the client's Version.
          MMO_VERSION: ${{ env.VERSION }}
        run: |
          # Drop the workspace-only devDependencies (@mmo/client, @mmo/core,
          # `workspace:*`): npm can't parse that protocol, and they're build-time
          # only — the bundle inlines them, so nothing ships them. bun resolves the
          # build from the root workspace node_modules regardless. Do this FIRST so
          # the version bump below never has to look at a `workspace:` spec.
          npm pkg delete devDependencies
          # Stamp the release Version with `npm pkg set`, NOT `npm version`: the
          # latter reifies the dependency tree (the whole bun workspace — every
          # sibling still carries `workspace:*`), and npm aborts with
          # EUNSUPPORTEDPROTOCOL. `npm pkg set` only rewrites the JSON field.
          npm pkg set version="$VERSION"
          npm publish --access public

      # --- Record the release on GitHub (notes + history) ------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
